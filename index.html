<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OneLook-现代化开源思维导图工具，一目了然，思维如流" />
  <meta name="keywords" content="思维导图,mindmap,脑图,在线,开源" />
  <title>OneLook-思维导图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* 页面基础布局：确保备案栏始终在底部 */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    #app {
      flex: 1;  /* 占据所有可用空间 */
      display: flex;
      flex-direction: column;
    }
    
    /* 备案栏样式 */
    .beian-bar {
      width: 100%;
      background: #1a1a1a;
      padding: 12px 0;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      flex-shrink: 0;  /* 防止被压缩 */
    }
    .beian-pc {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .beian-disclaimer {
      color: #f5c518;
      white-space: nowrap;
    }
    .beian-icp {
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
    }
    .beian-gongan {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
    }
    .beian-gongan img {
      width: 16px;
      height: 16px;
    }
    @media(max-width: 768px) {
      .beian-pc { display: none; }
      .beian-mobile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .beian-mobile a,
      .beian-mobile span {
        display: block;
        line-height: 1.8;
      }
    }
    @media(min-width: 769px) {
      .beian-mobile { display: none; }
    }
    @media all and (display-mode: fullscreen) {
    .beian-bar { display: none !important; }
     }
  </style>
</head>

<body>
  <div id="app"></div>
  
  <div class="beian-bar">
    <div class="beian-pc">
      <span class="beian-disclaimer">本站内容仅供学习和交流，非商业用途</span>
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="beian-icp">浙ICP备2025187466号</a>
      <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" target="_blank" rel="noopener noreferrer" class="beian-gongan">
        <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" onerror="this.style.display='none'">
        浙公网安备33030402001483号
      </a>
    </div>
    <div class="beian-mobile">
      <span class="beian-disclaimer">本站内容仅供学习和交流，非商业用途</span>
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="beian-icp">浙ICP备2025187466号</a>
      <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" target="_blank" rel="noopener noreferrer" class="beian-gongan">
        <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" onerror="this.style.display='none'">
        浙公网安备33030402001483号
      </a>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
